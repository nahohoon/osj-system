{% extends "base.html" %}
{% block title %}작업지시 생성 — 오성정공{% endblock %}
{% block content %}
<div class="page-header"><h2>▶ 작업지시 생성</h2></div>
<div class="form-card">
  <form method="post">
    <div class="form-grid">
      <div class="form-group full">
        <label class="form-label">생산계획 선택 <span class="req">*</span></label>
        <select name="plan_id" class="form-control" required>
          <option value="">-- 생산계획 선택 --</option>
          {% for p in plans %}
          <option value="{{ p.id }}">
            {{ p.plan_date }} ｜ {{ p.product.name }} ｜ 계획 {{ "{:,}".format(p.plan_qty) }}EA ｜ 금형: {{ p.mold.code if p.mold else '미지정' }} ｜ {{ p.shift }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">지시 수량 (EA) <span class="req">*</span></label>
        <input type="number" name="ordered_qty" class="form-control" min="0" required placeholder="예: 9000">
      </div>
      <div class="form-group">
        <label class="form-label">시작 예정일시</label>
        <input type="datetime-local" name="start_dt" class="form-control">
      </div>
      <div class="form-group full">
        <label class="form-label">비고</label>
        <textarea name="note" class="form-control" rows="2"></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">💾 작업지시 생성</button>
      <a href="{{ url_for('wo_list') }}" class="btn btn-gray">취소</a>
    </div>
  </form>
</div>
{% endblock %}
